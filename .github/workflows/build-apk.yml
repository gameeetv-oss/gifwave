name: Build & Deploy Android

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: https://nwdwfwokdpjdkpsztuuo.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53ZHdmd29rZHBqZGtwc3p0dXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTMzODMsImV4cCI6MjA4ODIyOTM4M30.H9_9Noz8A2kOeP1J2yHP9Vr_06S9T2q0UWdTL3Z1wUo
          VITE_BACKEND_URL: https://gifwave-backend.onrender.com

      - name: Install Capacitor
        working-directory: frontend
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor-community/admob

      - name: Add Android platform
        working-directory: frontend
        run: |
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android permissions and AdMob
        working-directory: frontend/android
        run: |
          sed -i 's|<uses-permission android:name="android.permission.INTERNET" />|<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />|' app/src/main/AndroidManifest.xml
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-4416578432335144~6450136156"/>\n    </application>|' app/src/main/AndroidManifest.xml

      - name: Patch MainActivity for media autoplay
        working-directory: frontend/android
        run: |
          cat > app/src/main/java/com/gifwave/app/MainActivity.java << 'EOF'
          package com.gifwave.app;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WebView webView = getBridge().getWebView();
                  WebSettings settings = webView.getSettings();
                  settings.setMediaPlaybackRequiresUserGesture(false);
              }
          }
          EOF

      - name: Fix Kotlin stdlib conflict
        working-directory: frontend/android
        run: |
          cat >> build.gradle << 'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                  }
              }
          }
          EOF

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/gifwave-release.keystore

      - name: Build Release AAB
        working-directory: frontend/android
        env:
          STORE_FILE: /tmp/gifwave-release.keystore
          STORE_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$STORE_FILE" \
            -Pandroid.injected.signing.store.password="$STORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASS"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: GifWave-release
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # Play Store otomatik yükleme ilk APK manuel yüklendikten sonra aktif edilecek
