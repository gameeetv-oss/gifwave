name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: https://nwdwfwokdpjdkpsztuuo.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53ZHdmd29rZHBqZGtwc3p0dXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTMzODMsImV4cCI6MjA4ODIyOTM4M30.H9_9Noz8A2kOeP1J2yHP9Vr_06S9T2q0UWdTL3Z1wUo
          VITE_BACKEND_URL: https://gifwave-backend.onrender.com

      - name: Install Capacitor
        working-directory: frontend
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Add Android platform
        working-directory: frontend
        run: |
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GifWave-debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
