workflows:
  ios-workflow:
    name: GifWave iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: 18
      vars:
        VITE_SUPABASE_URL: https://nwdwfwokdpjdkpsztuuo.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53ZHdmd29rZHBqZGtwc3p0dXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTMzODMsImV4cCI6MjA4ODIyOTM4M30.H9_9Noz8A2kOeP1J2yHP9Vr_06S9T2q0UWdTL3Z1wUo
        VITE_BACKEND_URL: https://gifwave-backend.onrender.com
    scripts:
      - name: Install dependencies
        script: |
          cd frontend
          npm install

      - name: Install Capacitor iOS
        script: |
          cd frontend
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Build web app
        script: |
          cd frontend
          npm run build

      - name: Add iOS platform
        script: |
          cd frontend
          npx cap add ios || true

      - name: Sync Capacitor
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd frontend/ios/App
          pod install

      - name: Build iOS (unsigned)
        script: |
          cd frontend
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/build \
            clean build

    artifacts:
      - $CM_BUILD_DIR/build/*.app
