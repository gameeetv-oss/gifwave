workflows:
  ios-workflow:
    name: GifWave iOS Build
    max_build_duration: 60
    environment:
      xcode: latest
      node: 18
      vars:
        VITE_SUPABASE_URL: https://nwdwfwokdpjdkpsztuuo.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53ZHdmd29rZHBqZGtwc3p0dXVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTMzODMsImV4cCI6MjA4ODIyOTM4M30.H9_9Noz8A2kOeP1J2yHP9Vr_06S9T2q0UWdTL3Z1wUo
        VITE_BACKEND_URL: https://gifwave-backend.onrender.com
    scripts:
      - name: Setup
        script: |
          cd frontend
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npm run build

      - name: Setup iOS
        script: |
          cd frontend
          ./node_modules/.bin/cap add ios || true
          echo "--- iOS folder contents ---"
          ls -la ios/ || echo "ios folder not found"
          ls -la ios/App/ || echo "ios/App not found"
          ./node_modules/.bin/cap sync ios

      - name: CocoaPods
        script: |
          cd frontend/ios/App
          pod install --repo-update

      - name: Build
        script: |
          xcodebuild \
            -workspace frontend/ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=$CM_BUILD_DIR/build \
            clean build

    artifacts:
      - $CM_BUILD_DIR/build/*.app
